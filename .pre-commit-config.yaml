exclude: ^(gen/|testdata/)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
# Linting runs in CI (.github/workflows/lint.yml) where a Go 1.25-built
# golangci-lint can be pinned. The locally installed binary varies by
# contributor and may lag behind the project's Go version.
