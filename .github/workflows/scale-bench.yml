name: scale-bench

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch: {}

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DIFFAH_BIG_TEST: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install zstd >= 1.5
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zstd
          zstd --version

      - name: Run scale bench under /usr/bin/time -v
        run: |
          /usr/bin/time -v -o time.out \
            go test \
              -tags='big containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper' \
              -timeout=75m \
              -v \
              -run TestScaleBench_2GiBLayer \
              ./pkg/exporter/...
          rss_kib=$(grep -oP 'Maximum resident set size \(kbytes\): \K[0-9]+' time.out || true)
          if [ -z "${rss_kib}" ]; then
            echo "FAIL: could not parse peak RSS from /usr/bin/time output"
            cat time.out
            exit 1
          fi
          echo "Peak RSS: ${rss_kib} KiB"
          if [ "${rss_kib}" -gt 8388608 ]; then
            echo "FAIL: peak RSS ${rss_kib} KiB exceeds 8 GiB ceiling (spec §13)"
            exit 1
          fi
          echo "PASS: peak RSS ${rss_kib} KiB <= 8 GiB ceiling"

      - name: Apply (scale)
        # NOTE: as of streaming PR6, TestImport_ScaleApply2GiB t.Skip's its
        # body until the apply scale-bench infrastructure (fixture + helper)
        # lands in a follow-up PR. Until then this step's "PASS" log line
        # only proves /usr/bin/time -v invoked go test successfully — NOT
        # that apply RSS is under 8 GiB. Spec §13 acceptance #10 remains
        # open. See lessons-learned 2026-05-04-import-streaming-lessons.md
        # post-PR-6 amendment.
        run: |
          /usr/bin/time -v -o apply_time.out \
            go test \
              -tags='big containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper' \
              -timeout=75m \
              -v \
              -run TestImport_ScaleApply2GiB \
              ./pkg/importer/...
          rss_kib=$(grep -oP 'Maximum resident set size \(kbytes\): \K[0-9]+' apply_time.out || true)
          if [ -z "${rss_kib}" ]; then
            echo "FAIL: could not parse peak RSS from /usr/bin/time output"
            cat apply_time.out
            exit 1
          fi
          echo "Apply Peak RSS: ${rss_kib} KiB"
          if [ "${rss_kib}" -gt 8388608 ]; then
            echo "FAIL: apply peak RSS ${rss_kib} KiB exceeds 8 GiB ceiling (spec §13)"
            exit 1
          fi
          echo "PASS: apply peak RSS ${rss_kib} KiB <= 8 GiB ceiling"

      - name: Apply (baseline-only-reuse scale)
        env:
          DIFFAH_SCALE_BENCH: "1"
        run: |
          /usr/bin/time -v -o baseline_only_apply_time.out \
            go test \
              -tags='big containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper' \
              -timeout=30m \
              -v \
              -run TestImport_ScaleBaselineOnlyReuse4GiB \
              ./pkg/importer/...
          rss_kib=$(grep -oP 'Maximum resident set size \(kbytes\): \K[0-9]+' baseline_only_apply_time.out || true)
          if [ -z "${rss_kib}" ]; then
            echo "FAIL: could not parse baseline-only apply peak RSS from /usr/bin/time output"
            cat baseline_only_apply_time.out
            exit 1
          fi
          echo "Baseline-only apply Peak RSS: ${rss_kib} KiB"
          if [ "${rss_kib}" -gt 12582912 ]; then
            echo "FAIL: baseline-only apply peak RSS ${rss_kib} KiB exceeds 12 GiB ceiling"
            exit 1
          fi
          echo "PASS: baseline-only apply peak RSS ${rss_kib} KiB <= 12 GiB ceiling"

      - name: Upload /usr/bin/time output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scale-bench-time-${{ github.run_id }}
          path: |
            time.out
            apply_time.out
            baseline_only_apply_time.out
