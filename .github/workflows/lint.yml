name: lint
on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true
      - name: govulncheck
        # Allowlist:
        #   GO-2026-4887 + GO-2026-4883 — docker/docker, "Fixed in:
        #     N/A". Reach diffah only via containers/image's
        #     alltransports init chain; diffah neither extracts
        #     docker tar archives (4887) nor installs docker
        #     plugins (4883).
        #   GO-2025-4098 — opencontainers/selinux v1.12.0. Fix
        #     ships in v1.13.0 but that release transitively
        #     forces cyphar/filepath-securejoin >= v0.6.0, which
        #     breaks go.podman.io/storage v1.62.0 (uses removed
        #     securejoin.OpenInRoot / Reopen). Lift this allowlist
        #     entry once go.podman.io/storage adopts the new API.
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          ALLOW='GO-2026-4887|GO-2026-4883|GO-2025-4098'
          set +e
          out=$(govulncheck -tags 'containers_image_openpgp exclude_graphdriver_btrfs exclude_graphdriver_devicemapper' ./...)
          rc=$?
          set -e
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          bad=$(echo "$out" | grep -E '^Vulnerability #' | grep -vE "$ALLOW" || true)
          if [ -n "$bad" ]; then
            echo "::error::Vulnerabilities outside allowlist:"
            echo "$bad"
            exit 1
          fi
          echo "::notice::govulncheck found only allowlisted no-fix vulnerabilities"
