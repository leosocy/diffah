name: integration
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache: true
      - run: go test -tags 'integration containers_image_openpgp' -race -cover ./...
