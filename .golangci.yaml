version: "2"
run:
  tests: true
  go: "1.25"
  build-tags:
    - containers_image_openpgp
    - exclude_graphdriver_btrfs
    - exclude_graphdriver_devicemapper
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - lll
    - misspell
    - nestif
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unused
    - whitespace
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    funlen:
      lines: 60
      statements: 40
    gocritic:
      enabled-tags:
        - performance
        - diagnostic
        - style
      disabled-tags:
        - experimental
      disabled-checks:
        # hugeParam is a micro-perf hint that is actively misleading in this
        # codebase: several methods implement the go.podman.io/image types
        # interfaces, which take BlobInfo by value. Pointer receivers would
        # break interface satisfaction. Disable globally rather than sprinkle
        # nolint directives on every interface method.
        - hugeParam
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 120
    nestif:
      min-complexity: 4
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - gocyclo
          - gosec
          - lll
        path: _test\.go
      - linters:
          # Fixture-builder scripts are linear orchestration; the
          # length/complexity rules punish that without improving clarity.
          - funlen
          - gocyclo
        path: scripts/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/leosocy/diffah
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
