version: "2"
run:
  tests: true
  go: "1.24"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - govet
    - lll
    - misspell
    - nestif
    - nolintlint
    - prealloc
    - revive
    - staticcheck
    - unused
    - whitespace
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    funlen:
      lines: 60
      statements: 40
    gocritic:
      enabled-tags:
        - performance
        - diagnostic
        - style
      disabled-tags:
        - experimental
    gocyclo:
      min-complexity: 12
    lll:
      line-length: 120
    nestif:
      min-complexity: 4
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - funlen
          - gocyclo
          - lll
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/leosocy/diffah
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
